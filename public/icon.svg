<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0b0e14"/>
  <!-- 光る路線の抽象図形: 3本の線が交差するイメージ -->
  <!-- グロー効果用フィルタ -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- グロー下層 -->
  <g filter="url(#glow)" opacity="0.6">
    <polyline points="80,400 200,260 320,320 440,120" fill="none" stroke="#38bdf8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="80,460 180,340 300,380 440,200" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="120,140 220,200 340,160 430,300" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- メイン線 -->
  <polyline points="80,400 200,260 320,320 440,120" fill="none" stroke="#38bdf8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="80,460 180,340 300,380 440,200" fill="none" stroke="#38bdf860" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="120,140 220,200 340,160 430,300" fill="none" stroke="#38bdf860" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 駅を示す点 -->
  <circle cx="200" cy="260" r="10" fill="#38bdf8"/>
  <circle cx="320" cy="320" r="10" fill="#38bdf8"/>
</svg>
